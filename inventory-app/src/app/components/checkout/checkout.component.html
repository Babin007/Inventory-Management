<div class="container py-4">
  <h2>Checkout</h2>
  <div class="row">
    <div class="col-md-6">
      <form>
        <h5>Shipping Information</h5>
        <div class="mb-3"><label class="form-label">Full Name</label><input type="text" class="form-control"></div>
        <div class="mb-3"><label class="form-label">Address</label><input type="text" class="form-control"></div>
        <div class="mb-3"><label class="form-label">City</label><input type="text" class="form-control"></div>
        <div class="mb-3"><label class="form-label">Postal Code</label><input type="text" class="form-control"></div>
      </form>
    </div>
    <div class="col-md-6">
      <form>
        <h5>Payment Details</h5>
        <div class="mb-3"><label class="form-label">Cardholder Name</label><input type="text" class="form-control"></div>
        <div class="mb-3"><label class="form-label">Card Number</label><input type="text" class="form-control"></div>
        <div class="row">
          <div class="col"><label class="form-label">Expiry</label><input type="text" class="form-control"></div>
          <div class="col"><label class="form-label">CVC</label><input type="text" class="form-control"></div>
        </div>
      </form>
    </div>
  </div>
  <div class="text-end mt-3">
    <button class="btn btn-success btn-lg">Pay Now</button>
  </div>
</div>
