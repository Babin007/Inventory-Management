<!-- inventory-app/src/app/components/home/home.component.html -->
<section class="hero bg-dark text-white text-center py-5">
  <div class="container">
    <h1 class="display-4">AutoParts Store</h1>
    <p class="lead">Find quality spare parts for every make and model.</p>
    <a class="btn btn-primary btn-lg mt-3" routerLink="/catalog">Browse Catalog</a>
  </div>
</section>

<div class="container my-5">
  <h2 class="text-center mb-4">Featured Items</h2>
  <div id="homeCarousel" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <div class="row justify-content-center">
          <div class="col-md-4">
            <div class="card shadow-sm">
              <img src="https://source.unsplash.com/600x400/?car,part" class="card-img-top" alt="Featured part">
              <div class="card-body text-center">
                <h5 class="card-title">Engine Oil Filter</h5>
                <p class="card-text text-primary">$19.99</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="carousel-item">
        <div class="row justify-content-center">
          <div class="col-md-4">
            <div class="card shadow-sm">
              <img src="https://source.unsplash.com/600x400/?brake,parts" class="card-img-top" alt="Featured part">
              <div class="card-body text-center">
                <h5 class="card-title">Brake Pad Set</h5>
                <p class="card-text text-primary">$49.99</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="carousel-item">
        <div class="row justify-content-center">
          <div class="col-md-4">
            <div class="card shadow-sm">
              <img src="https://source.unsplash.com/600x400/?spark,plug" class="card-img-top" alt="Featured part">
              <div class="card-body text-center">
                <h5 class="card-title">Spark Plug</h5>
                <p class="card-text text-primary">$14.99</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#homeCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#homeCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
</div>
